@if (artistName) {
  <div class="artist-page">
    @for (album of albums; track album.id) {
      <app-album-card
        [link]="'album/' + album.id"
        [name]="album.name"
        [year]="album.year"
        [image]="album.folder"
        (click)="onClick(`click_album_${album.id}_artist_${artistId}`)"
      ></app-album-card>
    }
    <app-streaming-list
      class="artist-page__streaming-list"
      [streaming]="streaming"
      (clickStreaming)="onClick(`click_streaming_${$event}_artist_${artistId}`)"
    ></app-streaming-list>
  </div>
}
